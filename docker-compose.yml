services:
  wezel1:
    build: .
    container_name: wezel1
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      NODE_ID: "1"
      PGDATA: "/var/lib/postgresql/18/data"
    volumes:
      - pg_wezel1:/var/lib/postgresql
      - ./wezel1/docker:/config
      - ./wezel1/docker/repmgr.conf:/etc/repmgr.conf
    networks:
      - repmgrnet

  wezel2:
    build: .
    container_name: wezel2
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      NODE_ID: "2"
      PGDATA: "/var/lib/postgresql/18/data"
    depends_on:
      - wezel1
    volumes:
      - pg_wezel2:/var/lib/postgresql
      - ./wezel2/docker:/config
      - ./wezel2/docker/repmgr.conf:/etc/repmgr.conf
    networks:
      - repmgrnet

volumes:
  pg_wezel1:
  pg_wezel2:

networks:
  repmgrnet:
    driver: bridge
